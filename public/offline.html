<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Radar de Vendas — offline</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0C1D24" />
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: #0c1d24;
        color: #e6eef0;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .wrap { max-width: 340px; }
      .logo { font-weight: 800; font-size: 28px; letter-spacing: -0.03em; }
      .dot { color: #ff6b5c; }
      h1 { font-size: 20px; margin: 24px 0 8px; }
      p { font-size: 14px; line-height: 1.55; color: #8fa9b0; margin: 0 0 22px; }
      button {
        border: none;
        cursor: pointer;
        background: #ff6b5c;
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        padding: 12px 22px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">Radar<span class="dot">.</span></div>
      <h1>Você está offline</h1>
      <p>Reconecte para importar conversas, transcrever os áudios e gerar a análise comercial.</p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
